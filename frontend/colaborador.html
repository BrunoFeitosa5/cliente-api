<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Colaborador — Apoio Renov</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="container mt-4">

    <!-- TOAST -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999">
        <div id="toast" class="toast align-items-center border-0 text-white" role="alert">
            <div class="d-flex">
                <div class="toast-body fw-semibold" id="toastMsg"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark px-3 nav-custom">
        <span class="logo-sistema">♻️ Time de Apoio Renov Smart</span>
        <span class="sub-titulo ms-auto">Área do Colaborador</span>
    </nav>

    <!-- NAV PÁGINAS -->
    <div class="nav-pages mt-3">
        <a href="/" class="nav-link-page">Painel</a>
        <a href="/status" class="nav-link-page">Status</a>
        <a href="/relatorios" class="nav-link-page">Relatórios</a>
        <a href="/colaborador" class="nav-link-page active">Área do Colaborador</a>
    </div>

    <!-- LOGIN -->
    <div class="card login-card mt-4" id="loginColab">
        <div class="login-form-inner">
            <div class="login-icon">👤</div>
            <h5 class="verde mt-2 mb-0">Área do Colaborador</h5>
            <small style="color:#555;">Entre para acessar sua área</small>
            <hr class="login-divider">
            <input id="colabEmail" class="form-control mt-2" placeholder="Email" type="email">
            <input id="colabSenha" type="password" class="form-control mt-2" placeholder="Senha">
            <button class="btn btn-login mt-3" onclick="entrarColab()">Entrar</button>
        </div>
    </div>

    <!-- ÁREA LOGADO -->
    <div id="areaLogado" style="display:none;">

        <!-- STATUS BAR -->
        <div class="card mt-4 p-3">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
                <div class="d-flex align-items-center gap-3">
                    <div class="online-pulse" style="width:16px;height:16px;"></div>
                    <span class="verde fw-bold fs-5" id="nomeOnline">—</span>
                    <small style="color:#555;">online agora</small>
                </div>
                <button class="btn btn-danger btn-sm px-3" onclick="sairColab()">Encerrar presença</button>
            </div>
        </div>

        <!-- ABAS -->
        <div class="nav-pages mt-3">
            <a href="#" class="nav-link-page nav-link-aba active" id="tabEscala" onclick="mostrarAba('Escala')">Minha Escala</a>
            <a href="#" class="nav-link-page nav-link-aba" id="tabColegas" onclick="mostrarAba('Colegas')">Colegas Online</a>
            <a href="#" class="nav-link-page nav-link-aba" id="tabPerfil" onclick="mostrarAba('Perfil')">Meu Perfil</a>
            <a href="#" class="nav-link-page nav-link-aba" id="tabSenha" onclick="mostrarAba('Senha')">Trocar Senha</a>
            <a href="#" class="nav-link-page nav-link-aba" id="tabIa" onclick="mostrarAba('Ia')">Chat IA</a>
        </div>

        <!-- ABA: ESCALA -->
        <div id="abaEscala" class="aba-content mt-3">
            <div class="card p-3">
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <button class="btn-nav-mes" onclick="mudarMes(-1)">&#9664;</button>
                    <h6 class="verde mb-0" id="tituloEscala">—</h6>
                    <button class="btn-nav-mes" onclick="mudarMes(1)">&#9654;</button>
                </div>
                <div id="tabelaEscala">
                    <p style="color:#555; text-align:center; font-size:14px;">Carregando...</p>
                </div>
            </div>
        </div>

        <!-- ABA: COLEGAS -->
        <div id="abaColegas" class="aba-content mt-3" style="display:none;">
            <div id="listaColegas" class="row g-3"></div>
        </div>

        <!-- ABA: PERFIL -->
        <div id="abaPerfil" class="aba-content mt-3" style="display:none;">
            <div class="card p-4" style="max-width:480px; margin:0 auto;">
                <h6 class="verde mb-3">Meus Dados</h6>
                <input id="pfNome" class="form-control mt-2" placeholder="Nome">
                <input id="pfEmail" class="form-control mt-2" placeholder="Email" disabled style="opacity:.4;">
                <input id="pfTelefone" class="form-control mt-2" placeholder="Telefone">
                <input id="pfHorario" class="form-control mt-2" placeholder="Horário">
                <button class="btn btn-success mt-3 w-100" onclick="salvarPerfil()">Salvar Alterações</button>
            </div>
        </div>

        <!-- ABA: SENHA -->
        <div id="abaSenha" class="aba-content mt-3" style="display:none;">
            <div class="card p-4" style="max-width:480px; margin:0 auto;">
                <h6 class="verde mb-3">Trocar Senha</h6>
                <input id="snAtual" type="password" class="form-control mt-2" placeholder="Senha atual">
                <input id="snNova" type="password" class="form-control mt-2" placeholder="Nova senha">
                <input id="snConfirma" type="password" class="form-control mt-2" placeholder="Confirmar nova senha">
                <button class="btn btn-success mt-3 w-100" onclick="trocarSenha()">Alterar Senha</button>
            </div>
        </div>

        <!-- ABA: IA -->
        <div id="abaIa" class="aba-content mt-3" style="display:none;">
            <div class="card p-3">
                <h6 class="verde mb-3">Assistente IA</h6>
                <div id="chatHistorico" class="chat-area"></div>
                <div class="d-flex gap-2 mt-2">
                    <input id="chatInput" class="form-control" placeholder="Digite sua mensagem..."
                        onkeydown="if(event.key==='Enter') enviarMensagemIA()">
                    <button class="btn btn-success px-3" onclick="enviarMensagemIA()">Enviar</button>
                </div>
            </div>
        </div>

    </div>

    <div style="height:40px;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="colaborador.js"></script>

</body>
</html>
