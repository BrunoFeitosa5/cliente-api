<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Apoio Renov</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="container mt-4">

    <!-- TOAST -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999">
        <div id="toast" class="toast align-items-center border-0 text-white" role="alert">
            <div class="d-flex">
                <div class="toast-body fw-semibold" id="toastMsg"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark px-3 nav-custom">
        <span class="logo-sistema">♻️ Time de Apoio Renov Smart</span>
        <span class="sub-titulo ms-auto">Painel de Colaboradores</span>
    </nav>

    <!-- NAV PÁGINAS -->
    <div class="nav-pages mt-3">
        <a href="/" class="nav-link-page active">Painel</a>
        <a href="/status" class="nav-link-page">Status</a>
        <a href="/relatorios" class="nav-link-page">Relatórios</a>
        <a href="/colaborador" class="nav-link-page">Área do Colaborador</a>
    </div>

    <!-- LOGIN -->
    <div class="card login-card mt-3" id="loginBox">
        <div class="login-form-inner">
            <div class="login-icon">🔐</div>
            <h5 class="verde mt-2 mb-0">Área Administrativa</h5>
            <small style="color:#555;">Acesso restrito</small>
            <hr class="login-divider">
            <input id="loginEmail" class="form-control mt-2" placeholder="Email" type="email">
            <input id="loginSenha" type="password" class="form-control mt-2" placeholder="Senha">
            <button class="btn btn-login mt-3" onclick="fazerLogin()">Entrar</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="row mt-4 text-center">

        <div class="col-md-4">
            <div class="card p-3">
                <h6 class="verde">Total de Colaboradores</h6>
                <h2 class="verde" id="totalClientes">0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h6 class="verde">Status Sistema</h6>
                <h2 class="verde">Online</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h6 class="verde">Última Atualização</h6>
                <h2 class="verde fs-4" id="ultimaAtualizacao">—</h2>
            </div>
        </div>

    </div>

    <!-- ADMIN -->
    <div class="card p-3 mt-4" id="areaAdmin" style="display:none;">
        <h5 class="titulo-branco">Adicionar Colaborador</h5>
        <input id="nome" class="form-control mt-2" placeholder="Nome">
        <input id="email" class="form-control mt-2" placeholder="Email" type="email">
        <input id="telefone" class="form-control mt-2" placeholder="Telefone">
        <input id="empresa" class="form-control mt-2" placeholder="Empresa">
        <input id="horario" class="form-control mt-2" placeholder="Horário">
        <input id="senha" type="password" class="form-control mt-2" placeholder="Senha">
        <button class="btn btn-success mt-3" onclick="criarCliente()">Adicionar</button>
    </div>

    <!-- TABELA -->
    <table class="table table-dark table-striped table-hover mt-4">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Email</th>
                <th>Telefone</th>
                <th>Empresa</th>
                <th>Horário</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabela"></tbody>
    </table>

    <!-- BOTÃO SAIR -->
    <div class="text-center mt-4 mb-4" id="containerSair" style="display:none;">
        <button class="btn btn-danger" onclick="logout()">Sair</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
